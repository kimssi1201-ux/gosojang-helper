<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>고소장 도우미</title>
    <meta name="description" content="AI가 사건 내용을 정리해 형사 고소장 초안 작성을 도와주는 웹앱" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ㄱ</div>
        <div><h1>고소장 도우미</h1></div>
      </div>
      <nav class="top-menu" aria-label="주요 메뉴">
        <a href="#write">작성</a>
        <a href="#draft">초안</a>
        <button id="menuSaveBtn" type="button">저장</button>
        <button id="menuShareBtn" type="button">공유</button>
      </nav>
    </header>

    <main class="workspace">
      <section id="write" class="input-pane" aria-label="사건 입력">
        <p class="simple-notice">입력한 내용을 바탕으로 고소장 초안을 만듭니다. 법률 자문은 아닙니다.</p>

        <div class="step-row"><span class="step-badge">1</span><h2>범죄유형</h2></div>
        <div id="caseTypeGrid" class="case-type-grid"></div>

        <div class="step-row"><span class="step-badge">2</span><h2>기본 정보</h2></div>
        <form id="complaintForm" class="form-grid">
          <label>고소인<input name="complainant" placeholder="예: 홍길동" autocomplete="off" /></label>
          <label>피고소인<input name="accused" placeholder="예: 김철수 또는 성명불상" autocomplete="off" /></label>
          <label>사건 일시<input name="incidentDate" placeholder="예: 2026년 6월 1일 14시경" /></label>
          <label>사건 장소<input name="incidentPlace" placeholder="예: 서울 강남구 소재 사무실" /></label>
          <label>피해금액 또는 피해내용<input name="damage" placeholder="예: 500만원 / 전치 2주 상해" /></label>
          <label>증거자료<input name="evidence" placeholder="예: 문자, 계좌이체내역, 녹취, CCTV" /></label>
          <label class="full-width">사건 설명<textarea name="story" rows="8" placeholder="언제, 어디서, 누가, 어떤 말이나 행동을 했고, 어떤 피해가 발생했는지 시간순으로 적어주세요."></textarea></label>
        </form>

        <div id="dynamicQuestions" class="question-box"></div>

        <div class="action-row">
          <button id="generateBtn" class="primary-button wide" type="button">AI 초안 생성</button>
          <button id="templateBtn" class="secondary-button" type="button">템플릿 초안</button>
        </div>
        <p id="autoSaveStatus" class="autosave-status">입력 내용은 이 브라우저에 자동 저장됩니다.</p>
      </section>

      <section id="draft" class="output-pane" aria-label="고소장 미리보기">
        <div class="preview-toolbar">
          <div><h2>고소장 초안</h2><p id="statusText">입력 후 초안을 생성하세요.</p></div>
          <div class="preview-actions">
            <button id="saveDraftBtn" class="ghost-button" type="button">저장</button>
            <button id="loadDraftBtn" class="ghost-button" type="button">불러오기</button>
            <button id="kakaoShareBtn" class="ghost-button kakao-button" type="button">카카오톡</button>
            <button id="downloadTxtBtn" class="ghost-button" type="button">TXT</button>
            <button id="printBtn" class="ghost-button" type="button">인쇄/PDF 저장</button>
          </div>
        </div>

        <textarea id="draftEditor" class="draft-editor" spellcheck="false"></textarea>

        <div class="reference-panel">
          <div><h3>누락 체크</h3><ul id="missingList"></ul></div>
          <div><h3>판례 참고</h3><ul id="precedentList"></ul></div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <span>저장 버튼은 이 브라우저에만 보관합니다. 서버에는 별도 저장하지 않습니다.</span>
      <span><a href="/privacy.html">개인정보 안내</a> · <a href="https://www.law.go.kr/precSc.do" target="_blank" rel="noreferrer">국가법령정보센터 판례 검색</a></span>
    </footer>

    <script type="module" src="/app.js"></script>
  </body>
</html>
